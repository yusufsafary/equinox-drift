kind = "web"
previewPath = "/"
title = "Equinox Drift"
version = "1.0.0"
id = "artifacts/equinox-drift"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21418

[services.development]
run = "pnpm --filter @workspace/equinox-drift run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/equinox-drift", "run", "build" ]
publicDir = "artifacts/equinox-drift/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21418"
BASE_PATH = "/"
